<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜市語文大賽：拼音夾夾樂</title>
    <style>
        :root {
            --night-bg: #1a1a2e;
            --shelf-color: #5d4037;
            --neon-pink: #ff00ff;
            --correct-green: #2ecc71;
            --wrong-red: #e74c3c;
        }

        body {
            margin: 0;
            background-color: var(--night-bg);
            color: white;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 遊戲視窗與背景圖 */
        #game-window {
            position: relative;
            width: 800px;
            height: 600px;
            background-image: url('https://res.klook.com/image/upload/q_85/c_fill,w_1360/GettyImages-983059272_t7roog.jpg');
            background-size: cover;
            background-position: center;
            border: 8px solid #444;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 夾子設計 */
        #cable { position: absolute; width: 2px; background: #ccc; top: 0; left: 399px; height: 0; transition: height 1s ease-in; z-index: 5; }
        #claw-container { position: absolute; width: 20px; height: 20px; top: 0; left: 390px; z-index: 10; transition: top 1s ease-in, left 0.1s linear; }
        #claw-base { width: 20px; height: 15px; background: #888; border-radius: 5px; }
        .arm { position: absolute; width: 8px; height: 50px; background: #aaa; border-radius: 5px; top: 10px; transition: transform 0.3s; transform-origin: top center; }
        #arm-left { left: -5px; transform: rotate(30deg); }
        #arm-right { right: -5px; transform: rotate(-30deg); }
        .grabbing #arm-left { transform: rotate(5deg); }
        .grabbing #arm-right { transform: rotate(-5deg); }

        /* 娃娃池 */
        .doll {
            position: absolute; width: 80px; height: 80px;
            background: #fff; border: 3px solid #ff9a9e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #333; font-weight: bold; font-size: 14px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: top 1s ease-in;
        }

        /* 櫃檯 */
        #shelf { position: absolute; bottom: 0; width: 100%; height: 80px; background: var(--shelf-color); display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        .collected-tag { background: #ffd700; color: #333; padding: 5px 12px; border-radius: 5px; font-weight: bold; animation: pop 0.3s ease; }

        /* 問答區 */
        #quiz-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        .quiz-card { background: white; color: #333; padding: 40px; border-radius: 20px; text-align: center; width: 400px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        /* 答題回饋文字 */
        #feedback-text {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 48px; font-weight: bold; z-index: 200; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }

        button { padding: 12px; font-size: 18px; cursor: pointer; border-radius: 10px; border: 2px solid #ddd; background: #f8f9fa; }
        button:hover { background: #eee; }

        @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>🏮 夜市語文大賽：拼音夾夾樂 🏮</h1>
    <div style="margin: 10px;">操作：← → 移動，空白鍵 [SPACE] 抓取</div>

    <div id="game-window">
        <div id="feedback-text"></div>

        <div id="cable"></div>
        <div id="claw-container">
            <div id="claw-base"></div>
            <div id="arm-left" class="arm"></div>
            <div id="arm-right" class="arm"></div>
        </div>

        <div id="doll-pool"></div>

        <div id="shelf">
            <span style="color: white; font-weight: bold;">戰利品：</span>
        </div>

        <div id="quiz-overlay">
            <div class="quiz-card">
                <h2 id="q-title">這是什麼？</h2>
                <div class="btn-group" id="q-options"></div>
            </div>
        </div>
    </div>

    <script>
        const vocabData = [
            {n: "雞排", p: "jī pái"}, {n: "珍珠奶茶", p: "zhēn zhū nǎi chá"},
            {n: "香腸", p: "xiāng cháng"}, {n: "蚵仔煎", p: "é á jiān"},
            {n: "地瓜球", p: "dì guā qiú"}, {n: "小籠包", p: "xiǎo lóng bāo"},
            {n: "牛肉麵", p: "niú ròu miàn"}, {n: "芒果冰", p: "máng guǒ bīng"}
        ];

        let clawX = 390;
        let isMoving = false;
        const clawContainer = document.getElementById('claw-container');
        const cable = document.getElementById('cable');
        const pool = document.getElementById('doll-pool');
        const feedback = document.getElementById('feedback-text');

        // 生成娃娃
        vocabData.forEach((data, i) => {
            const d = document.createElement('div');
            d.className = 'doll';
            d.style.left = (40 + i * 95) + 'px';
            d.style.top = '430px';
            d.innerHTML = data.n;
            d.dataset.name = data.n;
            d.dataset.pinyin = data.p;
            pool.appendChild(d);
        });

        window.addEventListener('keydown', (e) => {
            if (isMoving) return;
            if (e.key === 'ArrowLeft' && clawX > 20) clawX -= 20;
            if (e.key === 'ArrowRight' && clawX < 740) clawX += 20;
            if (e.key === ' ') startCatch();
            clawContainer.style.left = clawX + 'px';
            cable.style.left = (clawX + 9) + 'px';
        });

        function startCatch() {
            isMoving = true;
            document.getElementById('game-window').classList.add('grabbing');
            clawContainer.style.top = '430px';
            cable.style.height = '430px';

            setTimeout(() => {
                let caughtDoll = null;
                document.querySelectorAll('.doll').forEach(d => {
                    let dx = parseInt(d.style.left);
                    if (Math.abs(dx - clawX) < 45) caughtDoll = d;
                });

                if (caughtDoll) {
                    caughtDoll.style.top = '30px';
                    caughtDoll.style.left = clawX + 'px';
                }

                clawContainer.style.top = '0px';
                cable.style.height = '0px';

                setTimeout(() => {
                    document.getElementById('game-window').classList.remove('grabbing');
                    if (caughtDoll) openQuiz(caughtDoll);
                    else isMoving = false;
                }, 1000);
            }, 1000);
        }

        function openQuiz(doll) {
            const overlay = document.getElementById('quiz-overlay');
            const optionsBox = document.getElementById('q-options');
            document.getElementById('q-title').innerText = `「${doll.dataset.name}」的拼音是？`;
            overlay.style.display = 'flex';
            optionsBox.innerHTML = '';

            let choices = [doll.dataset.pinyin, "nǐ hǎo", "xiè xiè"];
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                const btn = document.createElement('button');
                btn.innerText = c;
                btn.onclick = () => {
                    overlay.style.display = 'none';
                    if (c === doll.dataset.pinyin) {
                        showFeedback("✅ 正確！", "#2ecc71");
                        collect(doll);
                    } else {
                        showFeedback("❌ 錯誤！", "#e74c3c");
                        doll.style.top = '430px'; // 答錯跳回池子
                    }
                    setTimeout(() => { isMoving = false; }, 1000);
                };
                optionsBox.appendChild(btn);
            });
        }

        function showFeedback(msg, color) {
            feedback.innerText = msg;
            feedback.style.color = color;
            feedback.style.opacity = "1";
            setTimeout(() => { feedback.style.opacity = "0"; }, 1500);
        }

        function collect(doll) {
            const shelf = document.getElementById('shelf');
            const tag = document.createElement('div');
            tag.className = 'collected-tag';
            tag.innerText = doll.dataset.name;
            shelf.appendChild(tag);
            doll.remove();
        }
    </script>
</body>
</html>
