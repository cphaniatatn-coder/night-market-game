<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>夜市拼音夾夾樂</title>
    <style>
        body { text-align: center; background: #1a1a2e; color: white; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 20px auto; background: #222; border: 10px solid #555; overflow: hidden; }
        
        /* 爪子 */
        #claw { position: absolute; width: 60px; height: 40px; background: #aaa; top: 0; left: 370px; z-index: 10; transition: top 1s ease-in; }
        #cable { position: absolute; width: 4px; background: #eee; top: 0; left: 398px; height: 0; }

        /* 娃娃 */
        .doll { position: absolute; width: 70px; height: 70px; background: #ff9a9e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; cursor: pointer; transition: all 0.5s; }
        
        /* 櫃檯 */
        #shelf { position: absolute; width: 100%; height: 80px; background: #8b4513; bottom: 0; display: flex; align-items: center; padding: 10px; gap: 10px; }
        .collected { width: 50px; height: 50px; background: #ffd700; border-radius: 10px; font-size: 12px; display: flex; align-items: center; justify-content: center; }

        /* 問答視窗 */
        #quiz-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .quiz-box { background: white; color: #333; padding: 30px; border-radius: 20px; text-align: center; }
        .options button { margin: 10px; padding: 10px 20px; cursor: pointer; border-radius: 10px; border: 2px solid #333; }
    </style>
</head>
<body>

    <h1>🏮 夜市拼音夾夾樂 🏮</h1>
    <p>使用 ← → 鍵移動爪子，空白鍵 [SPACE] 抓取娃娃！</p>

    <div id="game-container">
        <div id="cable"></div>
        <div id="claw"></div>
        <div id="doll-pool"></div>
        <div id="shelf">櫃檯：</div>
        
        <div id="quiz-overlay">
            <div class="quiz-box">
                <h2 id="question">這是什麼？</h2>
                <div class="options" id="options"></div>
            </div>
        </div>
    </div>

    <script>
        const vocab = [
            {n: "雞排", p: "jī pái"}, {n: "珍珠奶茶", p: "zhēn zhū nǎi chá"},
            {n: "香腸", p: "xiāng cháng"}, {n: "蚵仔煎", p: "é á jiān"},
            {n: "地瓜球", p: "dì guā qiú"}, {n: "小籠包", p: "xiǎo lóng bāo"}
        ];

        let clawX = 370;
        let isGrabbing = false;
        let currentDoll = null;

        const claw = document.getElementById('claw');
        const cable = document.getElementById('cable');
        const pool = document.getElementById('doll-pool');

        // 生成娃娃
        vocab.forEach((item, index) => {
            let d = document.createElement('div');
            d.className = 'doll';
            d.innerHTML = item.n;
            d.style.left = (100 + index * 120) + 'px';
            d.style.top = '450px';
            d.dataset.name = item.n;
            d.dataset.pinyin = item.p;
            pool.appendChild(d);
        });

        // 鍵盤控制
        window.addEventListener('keydown', (e) => {
            if (isGrabbing) return;
            if (e.key === 'ArrowLeft' && clawX > 0) clawX -= 20;
            if (e.key === 'ArrowRight' && clawX < 740) clawX += 20;
            if (e.key === ' ') startGrab();
            
            claw.style.left = clawX + 'px';
            cable.style.left = (clawX + 28) + 'px';
        });

        function startGrab() {
            isGrabbing = true;
            claw.style.top = '450px';
            cable.style.height = '450px';

            setTimeout(() => {
                checkCollision();
                claw.style.top = '0px';
                cable.style.height = '0px';
                setTimeout(() => { isGrabbing = false; }, 1000);
            }, 1000);
        }

        function checkCollision() {
            const dolls = document.querySelectorAll('.doll');
            dolls.forEach(d => {
                let dx = parseInt(d.style.left);
                if (Math.abs(dx - clawX) < 40) {
                    triggerQuiz(d);
                }
            });
        }

        function triggerQuiz(dollElement) {
            currentDoll = dollElement;
            const overlay = document.getElementById('quiz-overlay');
            const optionsDiv = document.getElementById('options');
            document.getElementById('question').innerText = `請選擇「${dollElement.dataset.name}」的正確拼音`;
            
            overlay.style.display = 'flex';
            optionsDiv.innerHTML = '';

            // 隨機產生選項 (包含正確答案)
            let choices = [dollElement.dataset.pinyin, "nǐ hǎo", "xiè xiè"];
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(c => {
                let btn = document.createElement('button');
                btn.innerText = c;
                btn.onclick = () => {
                    if (c === dollElement.dataset.pinyin) {
                        alert("✅ 答對了！放入櫃檯。");
                        addToShelf(dollElement);
                    } else {
                        alert("❌ 答錯了！娃娃跳回池子。");
                    }
                    overlay.style.display = 'none';
                };
                optionsDiv.appendChild(btn);
            });
        }

        function addToShelf(doll) {
            const shelf = document.getElementById('shelf');
            let item = document.createElement('div');
            item.className = 'collected';
            item.innerHTML = doll.dataset.name;
            shelf.appendChild(item);
            doll.remove();
        }
    </script>
</body>
</html>
