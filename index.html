<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪華版：夜市拼音大挑戰</title>
    <style>
        :root {
            --night-bg: #0f0f1b;
            --shelf-color: #3e2723;
            --neon-pink: #ff00ff;
            --neon-cyan: #00f2ff;
            --correct-green: #2ecc71;
            --wrong-red: #e74c3c;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            background-color: var(--night-bg);
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        /* 標題動畫 */
        h1 {
            margin: 15px 0;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.5; }
        }

        /* 遊戲主視窗 */
        #game-window {
            position: relative;
            width: 850px;
            height: 620px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://res.klook.com/image/upload/q_85/c_fill,w_1360/GettyImages-983059272_t7roog.jpg');
            background-size: cover;
            background-position: center;
            border: 10px solid #2c3e50;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 鋼索與夾子 */
        #cable { 
            position: absolute; width: 4px; background: linear-gradient(to right, #888, #ddd, #888); 
            top: 0; left: 398px; height: 0; transition: height 1s ease-in; z-index: 5; 
        }
        #claw-container { 
            position: absolute; width: 40px; height: 40px; top: 0; left: 380px; 
            z-index: 10; transition: top 1s ease-in, left 0.1s linear; 
        }
        #claw-base { 
            width: 40px; height: 20px; background: #555; border-radius: 5px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .arm { 
            position: absolute; width: 10px; height: 60px; background: #999; 
            border-radius: 5px; top: 15px; transition: transform 0.3s; transform-origin: top center; 
            border: 1px solid #444;
        }
        #arm-left { left: 5px; transform: rotate(35deg); }
        #arm-right { right: 5px; transform: rotate(-35deg); }
        .grabbing #arm-left { transform: rotate(10deg); }
        .grabbing #arm-right { transform: rotate(-10deg); }

        /* 娃娃池強化 */
        .doll {
            position: absolute; width: 85px; height: 90px;
            background: white; border: 4px solid var(--neon-pink);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: top 1s ease-in, transform 0.5s;
            z-index: 2; overflow: hidden; cursor: pointer;
        }
        .doll:hover { transform: scale(1.05) rotate(5deg); }
        .doll img { width: 90%; height: 90%; object-fit: cover; border-radius: 15px; }

        /* 戰利品架 */
        #shelf { 
            position: absolute; bottom: 0; width: 100%; height: 90px; 
            background: linear-gradient(to top, #2b1d0e, var(--shelf-color)); 
            display: flex; align-items: center; padding: 0 25px; gap: 15px;
            border-top: 4px solid #8d6e63;
        }
        .collected-tag { 
            background: var(--gold); color: #333; padding: 8px 15px; 
            border-radius: 8px; font-weight: bold; border: 2px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* 答題遮罩 - 強化信號原則 */
        #quiz-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px);
        }
        .quiz-card { 
            background: #fff; color: #333; padding: 40px; border-radius: 30px; 
            text-align: center; width: 450px; border: 8px solid var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
        }
        #q-img { width: 180px; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 5px solid #eee; }
        
        /* 選項按鈕 */
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
        .quiz-btn { 
            padding: 15px; font-size: 20px; cursor: pointer; border-radius: 15px; 
            border: 2px solid #ddd; background: #fdfdfd; transition: all 0.2s;
            font-weight: bold; color: #444;
        }
        .quiz-btn:hover { background: var(--neon-cyan); color: white; transform: translateY(-3px); }

        /* 回饋文字 */
        #feedback-text {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%);
            font-size: 60px; font-weight: bold; z-index: 200; opacity: 0; 
            text-shadow: 0 0 20px rgba(255,255,255,0.8); pointer-events: none;
        }

        /* 勝利畫面 */
        #win-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a2e, #000); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #win-screen h1 { font-size: 80px; color: var(--gold); text-shadow: 0 0 30px var(--gold); }
        .restart-btn { 
            margin-top: 50px; padding: 20px 50px; font-size: 28px; 
            background: var(--neon-pink); border: none; color: white; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px var(--neon-pink);
        }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
